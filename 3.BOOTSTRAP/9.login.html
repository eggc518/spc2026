<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Bootstrap Login</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f0f2f5;
    }

    .login-box {
        width: 35vw;
        min-width: 300px;
        padding: 40px;
        border-radius: 20px;
        background: white;

        /* 오른쪽 아래 방향 진한 그림자 */
        box-shadow:
            12px 12px 25px rgba(0,0,0,0.6),
            24px 24px 50px rgba(0,0,0,0.4),
            36px 36px 70px rgba(0,0,0,0.2);
    }
</style>
</head>

<body>

<div class="login-box">
    <h3 class="text-center mb-4">Login</h3>

    <form>
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="아이디 입력">
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="비밀번호 입력">
        </div>

        <button type="submit" class="btn btn-dark w-100">로그인</button>
    </form>
</div>

</body>
</html>
