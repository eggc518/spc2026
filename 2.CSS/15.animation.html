<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: rebeccapurple;

            animation-name: moveLeft; /* 내가 정한 이름 */
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-timing-function: linear;
            position: relative;
        }
        
        @keyframes moveLeft { /* 내가 정한 이름 */
            0% {
                left: 0;
            }
            100% {
                left: 300px;
            }
        }

        .text {
            color: black;
            animation-name: fadeOut;
            animation-duration: 1.5s;
            animation-delay: 2s;
            animation-timing-function: linear;
            animation-iteration-count: 3;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1; /* 불투명 */
            }
            100% {
                opacity: 0; /* 투명 */
            }
        }

        .circle {
            width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 20%;
            animation-name: rotateAndSacle;
            animation-duration: 3s;
            animation-iteration-count: infinite;
        }

        @keyframes rotateAndSacle {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.5);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .image {
            width: 200px;
            height: 300px;
            animation-name: shake;
            animation-duration: 1.0s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes shake {
            0% {
                transform: translate(0);
            }
            25% {
                transform: translateX(-10px) rotate(-10deg);
            }
            75% {
                transform: translateX(30px) rotate(20deg);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <hr>
    <p class="text">페이드 아웃 글자 효과</p>
    <hr>
    <div class="circle"></div>
    <hr>
    <img class="image" src="images/horse.jpg">
</body>
</html>
