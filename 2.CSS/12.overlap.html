<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .container {
            height: 400px;
            position: relative;
            margin: 30px;
        }

        .box1, .box2 {
            width: 100%;
            height: 100%;
            text-align: center;
            background-color: #44b3d4;
            opacity: 0.6;
            position: absolute;
        }

        .box2 {
            background-color: rgb(72, 221, 92);
        }

        .overlay {
            top: 200px;
        }

        .box1:hover {
            z-index: 5;
            opacity: 1.0;
            transform-style: all;
            transition-duration: 5s; /* transition 변화할때의 효과 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">상단 영역</div>
        <div class="box2 overlay">하단 영역</div>
    </div>
    
</body>
</html>
