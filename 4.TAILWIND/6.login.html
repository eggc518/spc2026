<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center; /* 좌우 중앙 */
        align-items: center;     /* 상하 중앙 */
        background: #f0f2f5;
    }

    .login-container {
        width: 35vw;
        min-width: 300px;
        padding: 40px;
        border-radius: 20px;
        background: white;

        /* 오른쪽 아래 방향 진한 그림자 + 그라데이션 느낌 */
        box-shadow: 
            10px 10px 20px rgba(0,0,0,0.6),
            20px 20px 40px rgba(0,0,0,0.4),
            30px 30px 60px rgba(0,0,0,0.2);
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .login-btn:hover {
        background: #555;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="아이디 입력">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호 입력">
    </div>

    <button class="login-btn">로그인</button>
</div>

</body>
</html>
