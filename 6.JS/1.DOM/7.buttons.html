<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>버튼 두개</h1>
    <div id="zero">0</div> <!-- 이걸 가져다가 -->
    <div>
        <button onclick="plusOne()">+1</button>
        <button onclick="minusOne()">-1</button>
    </div>

    <script>
        //각자의 버튼이 눌릴때마다 위에 div의 값을 가져다가 +1 또는 -1을 한다.
        function plusOne() {
            const getValue = document.getElementById('zero');
            getZero = getValue.textContent; //innerHTML 써도되는데 이건 태그도 가져와줌
            // console.log(getZero);
            let number = parseInt(getZero);
            number = number + 1;
            getValue.textContent = number;
            console.log(number);
        }

        function minusOne() {
            document.getElementById('zero').textContent -= 1; //한줄로 짧게 가능함
        }
    </script>
</body>
</html>
