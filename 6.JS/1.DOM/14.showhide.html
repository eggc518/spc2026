<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mydiv {
            display: none;
            width: 200px;
            height: 200px;
            background-color: lightsalmon;
        }
    </style>
</head>
<body>
    <h1>Show / Hide</h1>
    <button onclick="showhide3_bugfix2()">숨겨진 요소 토글</button>
    <div id="mydiv">이것은 숨겨진 div 요소입니다.</div>

    <script>
        //문제의 원인 : DOM에는 CSS 내용이 들어가지 않아서 style에 적용된것 못가져오고 inline만 가져옴
        function showhide_withbug() {
            const div = document.querySelector('#mydiv');
            if(div.style.display == 'none') {
                div.style.display = 'block';
                
            } else {            
                div.style.display = 'none';
            }
        }

        function showhide2_bugfix1() { //순서를 바꿔서 문제를 해결함
            const div = document.querySelector('#mydiv');
            if(div.style.display == 'block') {
                div.style.display = 'none';

            } else {            
                div.style.display = 'block';
            }
        }

        function showhide3_bugfix2() { //실제 style까지 적용된 결과로 연산
            const div = document.querySelector('#mydiv');
            const displayStyle = window.getComputedStyle(div).display; //연산된 결과를 가져옴(현재 적용된 CSS값)
            if(displayStyle == 'none') {
                div.style.display = 'block';
            } else {
                div.style.display = 'none';
            }
        }
    </script>
</body>
</html>
