<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>숫자 맞추기 게임</h1>
    <h2>1~100까지의 숫자를 맞췌보세요</h2>
    <input type="number" id="guessNumber" placeholder="숫자를 입력하시오">
    <button id="guessButton" onclick="guessNumber()">Guess</button>
    <div id="result"><!-- 결과 출력할 곳 --></div>

    <script>
        const randomNumber = Math.floor(Math.random()*100)+1; //0~99까지 -> 1~100까지
        console.log("생성한 숫자: ", randomNumber);
        const result = document.getElementById('result');
        
        function guessNumber() {
            const guess = document.getElementById('guessNumber').value;

            //찍은 숫자 크면 "숫자가 큽니다. 더 작은 숫자를 입력하세요."
            if(guess > randomNumber) {
                result.textContent = "숫자가 큽니다. 더 작은 숫자를 입력하세요.";

            } else if(guess < randomNumber) {
                //찍은 숫자 작으면 "숫자가 작습니다. 더 큰 숫자를 입력하세요."
                result.textContent = "숫자가 작습니다. 더 큰 숫자를 입력하세요.";
                
            } else {
                //정답이 맞으면 "축하합니다! 정답을 맞췄습니다."
                result.textContent = "축하합니다! 정답을 맞췄습니다."
            }
        }
    </script>
</body>
</html>
