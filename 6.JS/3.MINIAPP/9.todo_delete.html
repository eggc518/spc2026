<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #icon {
            display: none;
            width: 30px;
            height: 25px;
        }

        #todo-list li {
            cursor: pointer;
        }

        #todo-list li.done {
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1>오늘 할일 (Todo 리스트)</h1>
    <input type="text" id="new-todo" placeholder="할일 입력">
    <button id="add-todo">추가</button>
    <ul id="todo-list"><!-- 할일들 표시될곳 --></ul>
    <img src="images/del.png" id="icon">
    
    <script>
        //1. 버튼클릭되면
        //2. 값 읽어와서 ul 아래 li 추가
        const newInput = document.getElementById('new-todo');
        const addBtn = document.getElementById('add-todo');
        const todoList = document.getElementById('todo-list');
        const delIcon = document.getElementById('icon');
        
        addBtn.addEventListener('click', addTodo);
        
        function addTodo() {           
            if(newInput.value.trim() == '') { return; } //입력칸이 빈칸이면 종료

            const li = document.createElement('li');
            li.innerHTML = `${newInput.value} <button class="delBtn">삭제</button>`;  
            todoList.appendChild(li);
            
            newInput.value = '';
            
            //3. li 클릭해서 완료 상태 표시, css로 strike라인 추가
            //4. 완료 취소기능(위의 반대)
            li.addEventListener('click', () => {   
                li.classList.toggle('done');
            });

            //삭제버튼 추가
            const delBtn = li.querySelector('.delBtn');
            delBtn.addEventListener('click', () => {
                li.remove();
            })


        }

        //기능개선 -> 엔터로 버튼 클릭 기능 추가
        newInput.addEventListener('keydown', (ev) => {
            if(ev.key == 'Enter') {
                addTodo();
            }
        })

        //5. 삭제버튼 구현(각 항목마다 삭제 생성 및 버튼 클릭시 삭제)


        //6. 디자인(체크박스, 아이콘)
    </script>
</body>
</html>
