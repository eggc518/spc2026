<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>오늘 할일 (Todo 리스트)</h1>
    <input type="text" id="new-todo" placeholder="할일 입력">
    <button id="add-todo">추가</button>
    <ul id="todo-list"><!-- 할일들 표시될곳 --></ul>
    
    <script>
        //1. 버튼클릭되면
        //2. 값 읽어와서 ul 아래 li 추가
        const newInput = document.getElementById('new-todo');
        const addBtn = document.getElementById('add-todo');
        const todoList = document.getElementById('todo-list');
        
        addBtn.addEventListener('click', addTodo);
        
        function addTodo() {
            const li = document.createElement('li');
            li.textContent = newInput.value;
            todoList.appendChild(li);
            newInput.value = '';

            //3. li 클릭해서 완료 상태 표시, css로 strike라인 추가
            //4. 완료 취소기능(위의 반대)
            li.addEventListener('click', () => {                
                if(li.style.textDecoration == 'line-through') {
                    li.style.textDecoration = 'none';
                } else {
                    li.style.textDecoration = 'line-through';
                }
            });


        }

        //5. 삭제버튼 구현(각 항목마다 삭제 생성 및 버튼 클릭시 삭제)
        

        //6. 디자인(체크박스, 아이콘)
    </script>
</body>
</html>
