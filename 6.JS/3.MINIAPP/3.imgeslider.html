<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
        }

        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto; /*상하좌우*/
            text-align: center;
            max-width: 600px;
            align-items: center;
        }

        .slider img {
            max-width: 100%;
            height: 300px;
            display: none; /*기본 다숨김*/
        }

        .slider img.active {
            display: block; /*활성화된 이미지는 표시*/
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 20px;
            font-size: 16px;
        }

        #next {
            position: flex;
            transform: translate(40%, -550%);
            color: white;
            font-size: 20px;
        }

        #prev {
            position: flex;
            transform: translate(-40%, 590%);
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>이미지 슬라이더</h1>
    <div class="slider">
        <div>
            <div id="prev">Prev</div>
            <img id="img1" src="images/chip.jpg" class="active">
            <img id="img2" src="images/coon.jpg">
            <img id="img3" src="images/ele.jpg">
            <div id="next">Next</div>
        </div> 

        <div class="filename" id="filename">images/chip.jpg</div>

        <!-- <div class="buttons">
            <button id="prevBtn">이전</button>
            <button id="nextBtn">다음</button>
        </div> -->
    </div>

    <script>
        const images = document.querySelectorAll('.slider img');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const filename = document.getElementById('filename');
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');

        let index = 0;

        function show(direction) {
            images[index].classList.remove('active');
            index += direction;
            
            if(index >= images.length) index = 0;
            if(index < 0) index = images.length -1;

            images[index].classList.add('active');

            filename.textContent = images[index].src.split('/').slice(-2).join('/');
        }

        // nextBtn.addEventListener('click', () => show(1));
        // prevBtn.addEventListener('click', () => show(-1));

        prev.addEventListener('click', () => show(-1));
        next.addEventListener('click', () => show(1));



    </script>
</body>
</html>
