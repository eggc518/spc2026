<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/stopwatch.css">

</head>
<body>
    <!--스톱워치 전체 -->
    <div class="stopwatch-box">
        <!-- 스톱워치 표시 영역 -->
        <div class="display">00:00.00</div>

        <!-- 스톱워치 버튼 컨테이너 -->
        <div class="button-container">
            <button id="startBtn">시작</button>
            <button id="stopBtn">중지</button>
            <button id="resetBtn">초기화</button>
        </div>
    </div>

    <script>
        //1. DOM 요소를 모두 가져옴
        const display = document.querySelector('.display');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');

        let startTime; //스톱워치 시작시간
        let difference = 0; //경과시간
        let running = false;

        function startTimer() {
            // if(running) return;

            running = true;
            startTime = new Date().getTime();
            timerId = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            updateTime = new Date().getTime();
            difference = updateTime - startTime; //경과시간 계산

            let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((difference % (1000 * 60)) / (1000));
            let milliseconds = Math.floor((difference % (1000)) / 10);

            // console.log(`흘러간 시간 계산 ${minutes}분, ${seconds}초, ${milliseconds}ms`);

            display.textContent = 
                (minutes < 10 ? '0' + minutes:minutes)+':'+
                (seconds < 10 ? '0' + seconds:seconds)+'.'+
                (milliseconds <10 ? '0'+ milliseconds:milliseconds);
        }

        function stopTimer() {
            clearInterval(timerId);
        }

        function resetTimer() {
            clearInterval(timerId);
            display.textContent = '00:00.00';
        }
        
        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);
        
        
    </script>
</body>
</html>
