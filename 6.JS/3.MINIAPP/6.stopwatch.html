<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/stopwatch.css">

</head>
<body>
    <!--스톱워치 전체 -->
    <div class="stopwatch-box">
        <!-- 스톱워치 표시 영역 -->
        <div class="display">00:00:00</div>

        <!-- 스톱워치 버튼 컨테이너 -->
        <div class="button-container">
            <button id="startBtn">시작</button>
            <button id="stopBtn">중지</button>
            <button id="resetBtn">종료</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const display = document.querySelector('.display');
        let timer = null;
        
        //시작 버튼 누르면 실행
        startBtn.addEventListener('click', start);
        
        function start() {           
            timer = setInterval(() => {
                
                let time = display.textContent.split(':');
                let hr = Number(time[0]);
                let mm = Number(time[1]);
                let ss = Number(time[2]);

                ss++;

                if(ss == 60) {
                    ss = 0;
                    mm++;
                }

                if(mm == 60) {
                    mm =0;
                    hr++;
                }

                display.textContent = `
                ${String(hr).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}
                `;
            }, 1000);
        }

        //중지
        stopBtn.addEventListener('click', stop);

        function stop() {
            clearInterval(timer);
        }

        //리셋
        resetBtn.addEventListener('click', reset);

        function reset() {
            clearInterval(timer);
            display.textContent = '00:00:00';
        }

    </script>
</body>
</html>
