<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myButton {
            width: 200px;
            height: 100px;
            background-color: aqua;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="myButton">우클릭</duv>
    <script>
        document.getElementById('myButton').addEventListener('contextmenu', (ev) => {
            ev.preventDefault(); //기본 기능을 하지 못하게 함.
            console.log('우클릭 성공');
        })

        //위에는 특정요소만 막기
        //아래는 페이지 모든것 다 막기
        document.addEventListener('contextmenu', (ev) => {
            ev.preventDefault();
            alert('우리사이트 우클릭 막혔음');
        });
    </script>
</body>
</html>
